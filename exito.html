<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu compra! | Cat Joyas</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');

      document.addEventListener('DOMContentLoaded', () => {
          const params = new URLSearchParams(window.location.search);
          const orderNum = params.get('orden');
          
          // Disparamos el evento de conversión
          gtag('event', 'purchase', {
              transaction_id: orderNum || 'T_12345',
              value: 0.0, // Podrías pasar el total real por URL si quisieras
              currency: 'CLP',
              items: [] 
          });

          // Limpiamos el carrito local
          localStorage.removeItem('catjoyas_cart');
      });
    </script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .success-container { text-align: center; padding: 100px 20px; max-width: 600px; margin: 0 auto; }
        .success-icon { font-size: 4rem; color: #c5a059; margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 15px; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .order-box { background: #fafafa; border: 1px solid #eee; padding: 20px; margin-bottom: 40px; font-family: 'Lato', sans-serif; }
        .order-number { font-weight: 700; color: #000; font-size: 1.2rem; }
        .btn-home { display: inline-block; padding: 15px 40px; background: #000; color: #fff; text-decoration: none; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; transition: 0.3s; }
        .btn-home:hover { background: #333; }
    </style>
</head>
<body>

    <main class="success-container">
        <div class="success-icon">✓</div>
        <h1>Pedido Confirmado</h1>
        <p>Tu joya está siendo preparada en nuestro taller con la mayor dedicación. Recibirás un correo con los detalles del envío en breve.</p>
        
        <div class="order-box">
            <span>Número de pedido:</span><br>
            <span id="display-order" class="order-number">Cargando...</span>
        </div>

        <a href="index.html" class="btn-home">Volver a la tienda</a>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderNum = params.get('orden');
        if (orderNum) {
            document.getElementById('display-order').innerText = orderNum;
        }
    </script>
</body>
</html>
